<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お問い合わせ</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
</head>
<body>
    <div class="row">
        <div class="col-md-8 col-md-offset-2 b-l bg-white bg-auto">
            <h2 class="p-md bg-light lt b-b font-bold">お問い合わせ</h2>
            <hr/>
            <form action="//formspree.io/concigel@gmail.com" method="POST">
                <div class="form-group">
                    <label>お名前</label>
                    <input type="text" name="name" class="form-control">
                </div>
                <div class="form-group">
                    <label>ご連絡先メールアドレス</label>
                    <input type="email" name="_replyto" class="form-control">
                </div>
                <div class="form-group">
                    <label>メッセージ</label>
                    <textarea id="msg" rows="5" cols="20" class="form-control"></textarea>
                </div>
                <button id="submit" type="button" class="btn btn-info m-t">送る</button>
            </form>
        </div>
    </div>
</body>
</html>
